name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Compile Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Qt 6.7.2 for Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: 'linux'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtmultimedia qt5compat'
          cache: true
          dir: '${{ github.workspace }}/Qt'

      - name: Remove Incompatible Android SDKs
        run: |
          echo "Removing SDK 35 and 36 to force fallback to SDK 34..."
          rm -rf $ANDROID_HOME/platforms/android-35*
          rm -rf $ANDROID_HOME/platforms/android-36*

      - name: Build Release APK
        run: |
          mkdir -p build_release && cd build_release
          QT_ANDROID_CMAKE="${QT_ROOT_DIR}/bin/qt-cmake"
          
          "$QT_ANDROID_CMAKE" .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DANDROID_PLATFORM=android-34 \
            -DQT_ANDROID_ABIS="arm64-v8a;armeabi-v7a" \
            -DQT_ANDROID_BUILD_ALL_ABIS=ON

          cmake --build . --target apk --config Release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XpressiveGroovebox-APK
          path: build_release/android-build/**/*.apk
